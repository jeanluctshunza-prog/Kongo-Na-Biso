<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualités - KONGO NA BISO</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --vert: #007a33; --jaune: #f7d117; --bleu: #00aae4; --noir: #1a1a1a; --gris: #f4f7f6; }
        
        body { font-family: 'Open Sans', sans-serif; background: var(--gris); margin: 0; padding: 0; color: #333; }

        /* BARRE DE NAVIGATION (LOGO + RETOUR) */
        .navbar {
            background: white;
            padding: 10px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-logo { height: 45px; width: auto; }
        .btn-retour {
            text-decoration: none;
            color: var(--vert);
            font-weight: 700;
            border: 2px solid var(--vert);
            padding: 8px 18px;
            border-radius: 50px;
            transition: 0.3s;
            font-size: 0.9rem;
        }
        .btn-retour:hover { background: var(--vert); color: white; }

        .main-content { max-width: 850px; margin: 30px auto; padding: 0 15px; }

        /* FICHE D'ACTUALITÉ */
        .fiche-card { 
            background: white; border-radius: 25px; 
            margin-bottom: 50px; overflow: hidden; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-top: 6px solid var(--vert);
        }

        .fiche-header { padding: 30px 20px 20px; text-align: center; }
        
        /* TITRE EN GRAS NOIR */
        .fiche-header h2 { 
            font-family: 'Montserrat', sans-serif; font-weight: 900; 
            color: var(--noir); margin: 0 0 15px 0; font-size: 1.6rem; 
            line-height: 1.2; text-transform: uppercase;
        }

        /* DATE ENCADRÉE EN BAS DU TITRE */
        .date-box {
            display: inline-block;
            padding: 6px 16px;
            border: 2px solid var(--bleu);
            color: var(--bleu);
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        /* LE CAROUSEL */
        .carousel-container {
            width: 100%; height: 400px; overflow: hidden;
            position: relative; background: #000;
        }
        .carousel-track {
            display: flex; width: max-content;
            animation: scroll-loop linear infinite;
        }
        .carousel-track:hover { animation-play-state: paused; }
        .carousel-track img {
            height: 400px; width: auto; min-width: 350px;
            object-fit: cover; border-right: 4px solid #fff;
        }

        @keyframes scroll-loop {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* DESCRIPTION EN BAS AVEC PETITE POLICE */
        .fiche-body { padding: 25px; background: #fff; }
        .fiche-desc { 
            line-height: 1.7; 
            font-size: 0.85rem !important;
            text-align: justify; color: #444;
            white-space: pre-wrap;
        }

        #loading { text-align: center; font-weight: 700; color: var(--vert); margin: 50px; }

        @media (max-width: 600px) {
            .fiche-header h2 { font-size: 1.25rem; }
            .carousel-container, .carousel-track img { height: 280px; }
            .nav-logo { height: 35px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <img src="logo.jpeg" alt="Logo KNB" class="nav-logo" onerror="this.src='https://via.placeholder.com/100x50?text=KNB'">
        <a href="index.html" class="btn-retour">← Retour</a>
    </nav>

    <div class="main-content">
        <div id="activites-container">
            <div id="loading">Mise à jour des actualités...</div>
        </div>
    </div>

    <script>
        // URL de ton Google Sheets publié en CSV
        const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc50RBQgLLsA0HxQovLCDm88-exlV_SQmaNi_0eHMU9ygNc6my1fZZvERpQaMS7Z9zQwETeaYdHBtu/pub?output=csv";

        async function chargerActivites() {
            try {
                const res = await fetch(sheetUrl);
                const csvText = await res.text();
                
                // On découpe par ligne
                const rows = csvText.split(/\r?\n/).filter(r => r.trim() !== "");
                const container = document.getElementById('activites-container');
                container.innerHTML = ''; 

                // On parcourt de bas en haut (pour avoir la plus récente en premier)
                for (let i = rows.length - 1; i >= 1; i--) {
                    // Regex pour séparer les colonnes sans casser les textes avec virgules
                    const col = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (col.length < 3) continue;

                    const titre = col[0].replace(/^"|"$/g, "").trim();
                    const date = col[1].replace(/^"|"$/g, "").trim();
                    const photosRaw = col[2].replace(/^"|"$/g, "").trim();
                    const description = col[3] ? col[3].replace(/^"|"$/g, "").replace(/""/g, '"').trim() : "";

                    // GESTION DES PHOTOS : On sépare par VIRGULE OU ESPACE
                    const photoList = photosRaw.split(/[\s,]+/) 
                        .map(url => url.trim())
                        .filter(url => url.startsWith('http'));

                    if(photoList.length === 0) continue;

                    // Création du track (doublé pour l'infini)
                    const doublePhotos = [...photoList, ...photoList];
                    let imagesHTML = '';
                    doublePhotos.forEach(url => {
                        imagesHTML += `<img src="${url}" onerror="this.style.display='none'">`;
                    });

                    // Vitesse : 5 secondes par photo
                    const vitesse = Math.max(photoList.length * 5, 20);

                    container.innerHTML += `
                        <div class="fiche-card">
                            <div class="fiche-header">
                                <h2>${titre}</h2>
                                <div class="date-box">📅 ${date}</div>
                            </div>
                            
                            <div class="carousel-container">
                                <div class="carousel-track" style="animation-duration: ${vitesse}s">
                                    ${imagesHTML}
                                </div>
                            </div>

                            <div class="fiche-body">
                                <div class="fiche-desc">${description}</div>
                            </div>
                        </div>`;
                }
            } catch (e) {
                document.getElementById('loading').innerHTML = "Erreur : Impossible de charger les actualités.";
            }
        }
        
        chargerActivites();
    </script>
</body>
</html>

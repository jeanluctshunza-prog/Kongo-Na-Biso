<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualités - KONGO NA BISO</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --vert: #007a33; --jaune: #f7d117; --bleu: #00aae4; --blanc: #ffffff; --gris: #f8f9fa; }
        
        body { font-family: 'Open Sans', sans-serif; background: var(--gris); margin: 0; padding: 0; color: #333; }
        .main-content { max-width: 850px; margin: 30px auto; padding: 15px; }

        .fiche-card { 
            background: var(--blanc); border-radius: 20px; 
            margin-bottom: 50px; overflow: hidden; 
            box-shadow: 0 12px 25px rgba(0,0,0,0.08);
            border-top: 8px solid var(--vert);
        }

        .fiche-header { padding: 25px 20px; text-align: center; }
        .fiche-header h2 { 
            font-family: 'Montserrat', sans-serif; font-weight: 900; 
            color: var(--vert); margin: 0 0 8px 0; font-size: 1.6rem; 
            line-height: 1.2; text-transform: uppercase;
        }
        .fiche-date { font-weight: 600; color: var(--bleu); font-size: 1rem; display: block; }

        /* LE CAROUSEL QUI S'ADAPTE AU NOMBRE D'IMAGES */
        .carousel-container {
            width: 100%; height: 380px; overflow: hidden;
            position: relative; background: #111;
        }
        .carousel-track {
            display: flex; width: max-content;
            /* La vitesse s'adapte dans le JavaScript plus bas */
            animation: scroll-loop 30s linear infinite;
        }
        .carousel-track:hover { animation-play-state: paused; }
        .carousel-track img {
            height: 380px; width: auto; min-width: 320px;
            object-fit: cover; border-right: 3px solid #fff;
        }

        @keyframes scroll-loop {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .fiche-body { padding: 25px; background: #fff; border-top: 1px solid #eee; }
        .fiche-desc { 
            line-height: 1.7; 
            font-size: 0.88rem !important; /* Petite police demandée */
            text-align: justify; color: #444;
            white-space: pre-wrap;
        }

        #loading { text-align: center; font-weight: 700; color: var(--vert); margin: 30px; }

        @media (max-width: 600px) {
            .fiche-header h2 { font-size: 1.3rem; }
            .carousel-container, .carousel-track img { height: 260px; }
            .fiche-desc { font-size: 0.82rem !important; }
        }
    </style>
</head>
<body>

    <div class="main-content">
        <div id="activites-container">
            <div id="loading">Mise à jour des actualités...</div>
        </div>
    </div>

    <script>
        const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc50RBQgLLsA0HxQovLCDm88-exlV_SQmaNi_0eHMU9ygNc6my1fZZvERpQaMS7Z9zQwETeaYdHBtu/pub?output=csv";

        async function chargerActivites() {
            try {
                const res = await fetch(sheetUrl);
                const csvText = await res.text();
                const lines = csvText.split(/\r?\n/);
                const container = document.getElementById('activites-container');
                container.innerHTML = ''; 

                for (let i = lines.length - 1; i >= 1; i--) {
                    if (!lines[i].trim()) continue;
                    
                    // Découpage intelligent des colonnes
                    const col = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (col.length < 3) continue;

                    const titre = col[0].replace(/"/g, "").trim();
                    const date = col[1].replace(/"/g, "").trim();
                    const photosRaw = col[2].replace(/"/g, "").trim();
                    const description = col[3] ? col[3].replace(/"/g, "").trim() : "";

                    /* GESTION ILLIMITÉE DES PHOTOS */
                    const tableauPhotos = photosRaw.split(',')
                        .map(link => link.trim())
                        .filter(link => link.length > 10); // Ignore les liens vides

                    // On double les photos pour l'effet de boucle infinie
                    const doublePhotos = [...tableauPhotos, ...tableauPhotos];
                    let imagesHTML = '';
                    doublePhotos.forEach(url => {
                        imagesHTML += `<img src="${url}" onerror="this.src='logo.jpeg'">`;
                    });

                    // On ajuste la vitesse selon le nombre d'images (plus d'images = défilement plus long)
                    const vitesse = tableauPhotos.length * 4; 

                    container.innerHTML += `
                        <div class="fiche-card">
                            <div class="fiche-header">
                                <h2>${titre}</h2>
                                <span class="fiche-date">📅 ${date}</span>
                            </div>
                            <div class="carousel-container">
                                <div class="carousel-track" style="animation-duration: ${vitesse}s">${imagesHTML}</div>
                            </div>
                            <div class="fiche-body">
                                <div class="fiche-desc">${description}</div>
                            </div>
                        </div>`;
                }
            } catch (e) {
                document.getElementById('loading').innerHTML = "Erreur de chargement des données.";
            }
        }
        chargerActivites();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualités - KONGO NA BISO</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --vert: #007a33; --jaune: #f7d117; --bleu: #00aae4; --blanc: #ffffff; --gris: #f8f9fa; }
        
        body { font-family: 'Open Sans', sans-serif; background: var(--gris); margin: 0; padding: 0; color: #333; }
        .main-content { max-width: 850px; margin: 30px auto; padding: 15px; }

        /* FICHE D'ACTUALITÉ */
        .fiche-card { 
            background: var(--blanc); border-radius: 20px; 
            margin-bottom: 50px; overflow: hidden; 
            box-shadow: 0 12px 25px rgba(0,0,0,0.08);
            border-top: 8px solid var(--vert);
        }

        /* TITRE ET DATE */
        .fiche-header { padding: 25px 20px; text-align: center; background: #fff; }
        .fiche-header h2 { 
            font-family: 'Montserrat', sans-serif; font-weight: 900; 
            color: var(--vert); margin: 0 0 8px 0; font-size: 1.6rem; 
            line-height: 1.2; text-transform: uppercase;
        }
        .fiche-date { 
            font-weight: 600; color: var(--bleu); font-size: 1rem;
            display: block; text-transform: capitalize;
        }

        /* CAROUSEL FLUIDE */
        .carousel-container {
            width: 100%; height: 380px; overflow: hidden;
            position: relative; background: #111;
        }
        .carousel-track {
            display: flex; width: max-content;
            animation: scroll-loop 25s linear infinite;
        }
        .carousel-track:hover { animation-play-state: paused; }
        .carousel-track img {
            height: 380px; width: auto; min-width: 320px;
            object-fit: cover; border-right: 3px solid #fff;
        }

        @keyframes scroll-loop {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); } /* Reprend au début sans coupure */
        }

        /* DESCRIPTION OPTIMISÉE MOBILE */
        .fiche-body { padding: 25px; background: #fff; border-top: 1px solid #eee; }
        .fiche-desc { 
            line-height: 1.7; 
            font-size: 1.05rem; /* Taille parfaite pour mobile */
            text-align: justify; color: #444;
            white-space: pre-wrap;
        }

        #loading { text-align: center; font-weight: 700; color: var(--vert); margin-top: 50px; }

        /* ADAPTATION SMARTPHONE */
        @media (max-width: 600px) {
            .fiche-header h2 { font-size: 1.3rem; }
            .carousel-container { height: 260px; }
            .carousel-track img { height: 260px; }
            .fiche-desc { font-size: 0.95rem; } /* Légèrement plus petit pour éviter de trop scroller */
        }
    </style>
</head>
<body>

    <div class="main-content">
        <div id="activites-container">
            <div id="loading">Mise à jour des actualités...</div>
        </div>
    </div>

    <script>
        const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSc50RBQgLLsA0HxQovLCDm88-exlV_SQmaNi_0eHMU9ygNc6my1fZZvERpQaMS7Z9zQwETeaYdHBtu/pub?output=csv";

        fetch(sheetUrl)
        .then(res => res.text())
        .then(csvText => {
            const lines = csvText.split('\n');
            const container = document.getElementById('activites-container');
            container.innerHTML = ''; 

            for (let i = lines.length - 1; i >= 1; i--) {
                if (!lines[i].trim()) continue;

                const col = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                const titre = col[0].replace(/"/g, "");
                const date = col[1] ? col[1].replace(/"/g, "") : "";
                const photosRaw = col[2].replace(/"/g, "");
                const description = col[3].replace(/"/g, "");

                // Nettoyage et duplication des liens photos pour l'effet de boucle
                const tableauPhotos = photosRaw.split(',').map(link => {
                    let clean = link.trim();
                    if(clean.includes('ibb.co') && !clean.includes('i.ibb.co')) {
                        return clean.replace('ibb.co/', 'i.ibb.co/') + '.jpg';
                    }
                    return clean;
                });

                const doublePhotos = [...tableauPhotos, ...tableauPhotos];
                let imagesHTML = '';
                doublePhotos.forEach(url => {
                    if(url.length > 10) {
                        imagesHTML += `<img src="${url}" onerror="this.src='logo.jpeg'">`;
                    }
                });

                container.innerHTML += `
                    <div class="fiche-card">
                        <div class="fiche-header">
                            <h2>${titre}</h2>
                            <span class="fiche-date">📅 ${date}</span>
                        </div>
                        
                        <div class="carousel-container">
                            <div class="carousel-track">${imagesHTML}</div>
                        </div>

                        <div class="fiche-body">
                            <div class="fiche-desc">${description}</div>
                        </div>
                    </div>`;
            }
        });
    </script>
</body>
</html>
